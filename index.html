<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Luke Taylor | AWS Cloud Architect Portfolio</title>
    <!-- Google Fonts: Poppins (headings) and Outfit (body) for futuristic redesign -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  </head>

  <body>
    <style>
      html, body {
        margin: 0;
        background: #0f172a;
        color: #e5e7eb;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      #boot-error {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 99999;
        background: rgba(2, 6, 23, 0.98);
        color: #f8fafc;
        padding: 20px;
        overflow: auto;
        white-space: pre-wrap;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        line-height: 1.5;
      }
    </style>

    <div id="root"></div>
    <pre id="boot-error"></pre>
    <script>
      (function () {
        const errorPanel = document.getElementById('boot-error');
        const showError = (title, detail) => {
          if (!errorPanel) return;
          errorPanel.style.display = 'block';
          errorPanel.textContent = `${title}\n\n${detail || ''}`;
        };

        window.addEventListener('error', (event) => {
          const message = event?.error?.stack || event?.message || 'Unknown runtime error';
          showError('Client Runtime Error', message);
        });

        window.addEventListener('unhandledrejection', (event) => {
          const reason = event?.reason;
          const message = reason?.stack || reason?.message || String(reason || 'Unknown promise rejection');
          showError('Unhandled Promise Rejection', message);
        });
      })();
    </script>
    <script type="module" src="./src/main.tsx"></script>
    <script type="module">
      const endpoint = import.meta.env.VITE_ANALYTICS_ENDPOINT
      const websiteId = import.meta.env.VITE_ANALYTICS_WEBSITE_ID

      if (endpoint && websiteId) {
        const analyticsScript = document.createElement('script')
        analyticsScript.defer = true
        analyticsScript.src = `${endpoint}/umami`
        analyticsScript.setAttribute('data-website-id', websiteId)
        document.body.appendChild(analyticsScript)
      }
    </script>
  </body>

</html>
